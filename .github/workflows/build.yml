name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019 # 换Win2019，Chocolatey包更全
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    # 核心修复：用Chocolatey安装Qt 5.15（稳定，不会404）
    - name: 用 Chocolatey 安装 Qt 5.15.2
      run: |
        # 刷新Chocolatey源
        choco source add -n=chocolatey -s="https://community.chocolatey.org/api/v2/"
        # 安装Qt 5.15.2（MSVC2019 64位）
        choco install qt5-default -y --version=5.15.2
        # 配置环境变量
        echo "QTDIR=C:\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
        echo "PATH=C:\Qt\5.15.2\msvc2019_64\bin;C:\Qt\Tools\QtCreator\bin;$env:PATH" >> $env:GITHUB_ENV

    # 用Chocolatey安装OpenCV 3.4（稳定兼容）
    - name: 用 Chocolatey 安装 OpenCV 3.4.16
      run: |
        choco install opencv -y --version=3.4.16
        echo "OPENCV_DIR=C:\tools\opencv\build" >> $env:GITHUB_ENV
        echo "PATH=C:\tools\opencv\build\x64\vc15\bin;$env:PATH" >> $env:GITHUB_ENV

    # 配置VS2019编译环境
    - name: 配置 MSVC 2019 x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        toolset: 14.29

    # 验证环境
    - name: 检查工具链
      run: |
        echo "Qt路径: $env:QTDIR"
        echo "OpenCV路径: $env:OPENCV_DIR"
        qmake --version
        cl

    # 创建Qt5兼容的项目文件
    - name: 创建 Qt5 项目文件
      run: |
        (
        echo QT += core gui widgets
        echo CONFIG += c++11 release
        echo DESTDIR = ./release
        echo SOURCES += Card.cpp ZhangXuanCalculator.cpp WindowCapture.cpp CaptureThread.cpp MainWindow.cpp main.cpp
        echo HEADERS += Card.h ZhangXuanCalculator.h WindowCapture.h CaptureThread.h MainWindow.h
        echo FORMS += MainWindow.ui
        echo INCLUDEPATH += $$(OPENCV_DIR)/include $$(OPENCV_DIR)/include/opencv $$(OPENCV_DIR)/include/opencv2
        echo LIBS += -L$$(OPENCV_DIR)/x64/vc15/lib -lopencv_world3416
        echo LIBS += -luser32 -lgdi32 -lwinmm
        ) > ZhangXuanCalculator.pro
        type ZhangXuanCalculator.pro

    # 编译
    - name: 编译项目
      run: |
        qmake ZhangXuanCalculator.pro
        nmake

    # 打包（包含所有依赖）
    - name: 打包成品
      run: |
        mkdir -Force ./final
        copy ./release/ZhangXuanCalculator.exe ./final/
        
        # 复制Qt依赖
        windeployqt ./final/ZhangXuanCalculator.exe --release --no-translations --no-opengl-sw
        
        # 复制OpenCV依赖
        copy "C:\tools\opencv\build\x64\vc15\bin\opencv_world3416.dll" ./final/
        
        # 复制VC运行库
        $vcPath = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Redist\MSVC\14.29.30133\x64\Microsoft.VC142.CRT"
        copy "$vcPath\*.dll" ./final/
        
        # 压缩
        Compress-Archive -Path ./final/* -DestinationPath ZhangXuanCalculator_Final.zip -Force

    # 上传成品
    - name: 上传编译好的成品
      uses: actions/upload-artifact@v4
      with:
        name: ZhangXuanCalculator_Win64
        path: ZhangXuanCalculator_Final.zip
        retention-days: 90
