name: Build Windows Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30 # 延长超时时间

    steps:
    - uses: actions/checkout@v4

    # 核心修复：用官方预编译的Qt运行时+编译工具，跳过完整Qt安装
    - name: 安装Qt编译依赖（轻量版，无需完整安装）
      run: |
        # 下载Qt 6.5.3 预编译工具包（官方直链）
        Invoke-WebRequest -Uri "https://download.qt.io/online/qtsdkrepository/windows_x86/desktop/qt6_653/qt.6.5.3.win64_msvc2022_64/6.5.3-0-202309141002qtbase-Windows-Windows_10-MSVC2022-Windows-Windows_10-X86_64.7z" -OutFile "qtbase.7z"
        
        # 解压Qt核心文件
        mkdir -Force C:\Qt\6.5.3\msvc2022_64
        7z x qtbase.7z -oC:\Qt\6.5.3\msvc2022_64 -y
        
        # 下载Qt工具（qmake/windeployqt）
        Invoke-WebRequest -Uri "https://download.qt.io/online/qtsdkrepository/windows_x86/desktop/tools_qtcreator/qt.tools.qtcreator/12.0.2-0-202402220921qt-creator-opensource-windows-x86_64.7z" -OutFile "qtcreator.7z"
        7z x qtcreator.7z -oC:\Qt\Tools\QtCreator -y
        
        # 配置环境变量
        echo "QTDIR=C:\Qt\6.5.3\msvc2022_64" >> $env:GITHUB_ENV
        echo "PATH=C:\Qt\6.5.3\msvc2022_64\bin;C:\Qt\Tools\QtCreator\bin;$env:PATH" >> $env:GITHUB_ENV

    # 安装OpenCV（改用更稳定的3.4版本，兼容所有环境）
    - name: 安装 OpenCV 3.4.20（最后兼容全版本）
      run: |
        Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/3.4.20/opencv-3.4.20-vc14_vc15.exe" -OutFile "opencv.exe"
        .\opencv.exe -o"C:\opencv" -y
        echo "OPENCV_DIR=C:\opencv\build" >> $env:GITHUB_ENV
        echo "PATH=C:\opencv\build\x64\vc15\bin;$env:PATH" >> $env:GITHUB_ENV

    # 配置VS编译环境
    - name: 配置 MSVC 2022 x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # 适配OpenCV 3.4的项目文件（修改链接库名称）
    - name: 创建适配版项目文件
      run: |
        (
        echo QT += core gui widgets
        echo CONFIG += c++11 release # 降级到C++11，兼容所有编译器
        echo DESTDIR = ./release
        echo SOURCES += Card.cpp ZhangXuanCalculator.cpp WindowCapture.cpp CaptureThread.cpp MainWindow.cpp main.cpp
        echo HEADERS += Card.h ZhangXuanCalculator.h WindowCapture.h CaptureThread.h MainWindow.h
        echo FORMS += MainWindow.ui
        echo INCLUDEPATH += $$(OPENCV_DIR)/include $$(OPENCV_DIR)/include/opencv $$(OPENCV_DIR)/include/opencv2
        echo LIBS += -L$$(OPENCV_DIR)/x64/vc15/lib -lopencv_world3420
        echo LIBS += -luser32 -lgdi32 -lwinmm
        ) > ZhangXuanCalculator.pro
        type ZhangXuanCalculator.pro

    # 编译（简化步骤）
    - name: 编译项目
      run: |
        qmake ZhangXuanCalculator.pro
        nmake

    # 打包（确保所有依赖都包含）
    - name: 打包成品
      run: |
        mkdir -Force ./final
        copy ./release/ZhangXuanCalculator.exe ./final/
        
        # 复制Qt依赖
        windeployqt ./final/ZhangXuanCalculator.exe --release --no-translations
        
        # 复制OpenCV依赖
        copy "C:\opencv\build\x64\vc15\bin\opencv_world3420.dll" ./final/
        
        # 复制VC运行库
        $vcPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.38.33130\x64\Microsoft.VC143.CRT"
        copy "$vcPath\*.dll" ./final/
        
        # 压缩
        Compress-Archive -Path ./final/* -DestinationPath ZhangXuanCalculator_Final.zip -Force

    # 上传成品
    - name: 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: ZhangXuanCalculator_Win64
        path: ZhangXuanCalculator_Final.zip
        retention-days: 90
